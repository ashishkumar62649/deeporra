name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Verify compilation
        run: python -m compileall -q deeporra
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
      - name: Check test collection
        run: python -m pytest --collect-only -q
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
      - name: Run tests
        run: python -m pytest -q -ra
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
      - name: Doctor (console script)
        run: deeporra doctor
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
      - name: Doctor (module)
        run: python -m deeporra doctor
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
