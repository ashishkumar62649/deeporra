# DeepOrra CI — single Python 3.12, Windows, offline mode
# This workflow runs tests, compilation checks, and doctor diagnostics.
# The embedding model check skips in offline CI environments (HF_HUB_OFFLINE=1).
# Note: GitGuardian and Vercel integrations may show as "queued" — these are external checks.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m pip check
      - name: Runtime diagnostics
        run: |
          python --version
          python -m pip --version
          python -m pip check
          python -c "import torch; print('torch', torch.__version__)"
          python -c "import sentence_transformers; print('sentence-transformers import OK')"
          python -c "import transformers; print('transformers import OK')"
          python -c "import mcp; print('mcp import OK')"
          python -c "import streamlit; print('streamlit', streamlit.__version__)"
          python -c "import chromadb; print('chromadb import OK')"
          python -c "import deeporra; print('deeporra', deeporra.__version__)"
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
          TOKENIZERS_PARALLELISM: false
      - name: Verify compilation
        run: python -m compileall -q deeporra
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
          TOKENIZERS_PARALLELISM: false
      - name: Check test collection
        run: python -m pytest --collect-only -q
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
          TOKENIZERS_PARALLELISM: false
      - name: Run tests
        run: python -m pytest -q -ra
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
          TOKENIZERS_PARALLELISM: false
      - name: Doctor (console script)
        run: deeporra doctor
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
          TOKENIZERS_PARALLELISM: false
      - name: Doctor (module)
        run: python -m deeporra doctor
        env:
          HF_HUB_OFFLINE: 1
          TRANSFORMERS_OFFLINE: 1
          TOKENIZERS_PARALLELISM: false
      - name: Summary
        run: echo "✅ All checks passed for ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
